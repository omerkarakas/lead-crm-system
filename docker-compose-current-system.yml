services:
  traefik:
    image: traefik:v2.11
    command:
      - --api=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.mytlschallenge.acme.tlschallenge=true
      - --certificatesresolvers.mytlschallenge.acme.email=${SSL_EMAIL}
      - --certificatesresolvers.mytlschallenge.acme.storage=/letsencrypt/acme.json
    restart: always
    ports:
      - 80:80
      - 443:443
    volumes:
      - traefik_data:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro

  n8n:
    image: docker.n8n.io/n8nio/n8n
    env_file:
      - .env.current
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.n8n.tls=true
      - traefik.http.routers.n8n.entrypoints=web,websecure
      - traefik.http.routers.n8n.tls.certresolver=mytlschallenge
      - traefik.http.middlewares.n8n.headers.SSLRedirect=true
      - traefik.http.middlewares.n8n.headers.STSSeconds=315360000
      - traefik.http.middlewares.n8n.headers.browserXSSFilter=true
      - traefik.http.middlewares.n8n.headers.contentTypeNosniff=true
      - traefik.http.middlewares.n8n.headers.forceSTSHeader=true
      - traefik.http.middlewares.n8n.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.n8n.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.n8n.headers.STSPreload=true
      - traefik.http.routers.n8n.middlewares=n8n@docker
    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_BINARY_DATA_MODE=filesystem
      - N8N_BINARY_DATA_FOLDER=/home/node/.n8n/binary_data
      - N8N_BINARY_DATA_DATABASE_MAX_FILE_SIZE=1024
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,googleapis,stream
      - NODE_FUNCTION_ALLOW_BUILTIN=fs,path,https,url,child_process
      - N8N_RUNNERS_MAX_OLD_SPACE_SIZE=4096
      - NODE_OPTIONS=--max-old-space-size=4096
      - N8N_BLOCK_FS_WRITE_ACCESS_TO_WHITELIST=true
      - N8N_ALLOWED_BINARY_DATA_MODES=filesystem
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false

      # Sadece bu klasöre okuma/yazma izni ver:
      - N8N_DEFAULT_BINARY_DATA_PATH=/files
      - N8N_RESTRICT_FILE_ACCESS_TO=/home/node/.n8n;/files

      # DB (Queue mode DEĞIL - normal standalone mod)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8ndb
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=7hMdwFPxoJNgOBy9HCc5

      - WEBHOOK_URL=https://${SUBDOMAIN}.${DOMAIN_NAME}/
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE}
      - N8N_PROXY_HOPS=1
    restart: always
    volumes:
      - n8n_data:/home/node/.n8n
      - /local-files:/files
    depends_on:
      - postgres
    ports:
      - 127.0.0.1:5678:5678

  redis:
    image: redis:6
    container_name: redis
    restart: always
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:15
    container_name: n8n-postgres
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: 7hMdwFPxoJNgOBy9HCc5
      POSTGRES_DB: n8ndb
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  traefik_data:
    external: true
  n8n_data:
    external: true
  pgdata:
  redis_data:
